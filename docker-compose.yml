services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: afdp-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - afdp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afdp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: ./apps/api
    container_name: afdp-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: node:20-alpine
    container_name: afdp-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      API_BASE_URL: http://api:8000/api/v1
    volumes:
      - ./apps/web:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  afdp_postgres_data: